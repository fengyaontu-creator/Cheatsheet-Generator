# nginx server block for cheatsheet-app.
# Install:
#   sudo cp deploy/nginx-cheatsheet.conf /etc/nginx/sites-available/cheatsheet
#   sudo ln -s /etc/nginx/sites-available/cheatsheet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - repo cloned to /opt/cheatsheet/
#   - frontend built at /opt/cheatsheet/cheatsheet-app/frontend/dist/
#   - backend bound to 127.0.0.1:8001
#   - DNS `cheatsheet.norafeng.duckdns.org` pointed at this host

# Rate-limit zone for LLM-invoking ingest endpoints: 3 requests per minute
# per client IP. Bursts up to 5 are absorbed without delay; the 6th fires
# 429. Polling (/api/ingest/jobs/{id}) is deliberately not rate-limited;
# the frontend polls every few seconds for progress.
limit_req_zone $binary_remote_addr zone=cheatsheet_ingest:10m rate=3r/m;

server {
    listen 80;
    listen [::]:80;
    server_name cheatsheet.norafeng.duckdns.org;

    # Big uploads: up to 10 files, PDFs and images. 50M covers the common
    # study-pack size; raise if users hit 413.
    client_max_body_size 50M;

    # LLM generation can take several minutes for a long document. These
    # timeouts only kick in when a single upstream request stalls; the
    # async job API polls so the outer HTTP calls stay short.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # Static frontend (Vite build output).
    root /opt/cheatsheet/cheatsheet-app/frontend/dist;
    index index.html;

    # Rate-limit the expensive LLM-invoking ingest endpoints. Matches:
    #   POST /api/ingest
    #   POST /api/ingest/text
    #   POST /api/ingest/jobs/files
    #   POST /api/ingest/jobs/text
    # Does NOT match /api/ingest/jobs/{id} polling (ends with an id, not
    # /files or /text).
    location ~ ^/api/ingest(/text|/jobs/(files|text))?$ {
        limit_req zone=cheatsheet_ingest burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths fall through to index.html so React
    # Router handles them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets; index.html stays uncached so deploys
    # are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
